services:
  vinted-bot:
    build: .
    container_name: vinted-scraper
    restart: unless-stopped
    env_file:
      - .env
    
    # Da wir kein Playwright mehr nutzen, reichen 512MB RAM dicke aus
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # Logging konfigurieren, damit der Festplattenplatz nicht voll läuft
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"
